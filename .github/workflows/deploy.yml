name: Test and Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Fixes the Node.js deprecation warning
          
      - name: Install Dependencies
        run: npm ci
        
      - name: Run Tests
        run: npm test

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true # Forces GitHub to enable Pages for Actions
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './src' # Note: Ensure your index.html is inside a 'src' folder
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4