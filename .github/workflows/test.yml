name: Run Tests

on:
  pull_request:
    branches: ["main"]
  push:
    branches-ignore: ["main"] # Prevents duplicate test runs if deploy.yml already tests the main branch

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Jest Tests
        run: npm test